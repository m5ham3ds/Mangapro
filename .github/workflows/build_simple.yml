name: Build ProComic Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Apply spotless formatting
        run: ./gradlew spotlessApply

      - name: Build extension
        run: ./gradlew :src:ar:prochan:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: procomic-extension
          path: "**/*.apk"
          retention-days: 7